name: Auto Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create OptiFine Package
        run: |
          mkdir -p build/optifine
          cp -r shaders build/optifine/
          cp pack.mcmeta build/optifine/
          cd build/optifine
          zip -r ../DarkFimoz-Shaders-OptiFine-${{ github.ref_name }}.zip .
      
      - name: Create Iris Package
        run: |
          mkdir -p build/iris
          cp -r shaders build/iris/
          cp pack.mcmeta build/iris/
          cd build/iris
          zip -r ../DarkFimoz-Shaders-Iris-${{ github.ref_name }}.zip .
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/DarkFimoz-Shaders-OptiFine-${{ github.ref_name }}.zip
            build/DarkFimoz-Shaders-Iris-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
